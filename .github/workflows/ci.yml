# This is a basic workflow to help you get started with Actions
name: Testing

on:
   push:
    branches: [ "master" ]
   pull_request:
    branches: [ "master" ]

jobs:
  test_project:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: Run Django unit tests
      run: |
       pip3 install --user django
       python manage.py test
